name: Release (semantic-release)

# Manual trigger ONLY — this never auto-fires on push, by design.
#
# semantic-release reads Conventional Commits since the last release tag, then:
#   computes the next version → updates CHANGELOG.md → bumps package.json →
#   creates the git tag → publishes to npm → opens the GitHub Release.
#
# ⚠️ PREREQUISITES — read RELEASING.md before the first real run:
#   1. Repo secret NPM_TOKEN must be an npm *automation/granular* token with
#      "bypass two-factor authentication" enabled (a plain web-login token can't
#      publish under 2FA — this is the exact wall we hit publishing rc.8 by hand).
#   2. The orphan tag v2.0.0 must be deleted first. It is an ancestor of main, so
#      semantic-release would treat 2.0.0 as the baseline and compute a 2.x
#      version — silently skipping the 1.0.0 release.
#   3. `main` has no prerelease channel, so a real run cuts a STABLE version to
#      the `latest` dist-tag. Keep publishing release candidates with the manual
#      `npm publish --tag rc` flow until you decide 1.0.0 is ready.
#
# The dry_run input defaults to true: a manual trigger only PREVIEWS the next
# version unless you explicitly set dry_run = false.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (compute the next version without publishing)'
        type: boolean
        default: true

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (also typechecks via tsc)
        run: npm run build

      - name: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npx semantic-release --dry-run
          else
            npx semantic-release
          fi
