name: Release Cowork

on:
  workflow_dispatch:
  push:
    tags:
      - 'cowork-v*'

permissions:
  contents: write
  packages: write

jobs:
  release-cowork:
    name: Create Cowork Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install Cowork dependencies
        working-directory: cowork
        run: npm ci

      - name: Compile core
        run: npx tsc -p .

      - name: Build Cowork (renderer + main + preload)
        working-directory: cowork
        run: npx vite build

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/cowork-v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/cowork-v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(node -p "require('./cowork/package.json').version")" >> $GITHUB_OUTPUT
          fi

      - name: Verify package.json version matches tag
        if: startsWith(github.ref, 'refs/tags/cowork-v')
        working-directory: cowork
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "${{ steps.version.outputs.VERSION }}" ]; then
            echo "::error::Tag version (${{ steps.version.outputs.VERSION }}) does not match package.json version ($PKG_VERSION)."
            exit 1
          fi

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/cowork-v')
        working-directory: cowork
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate changelog
        if: startsWith(github.ref, 'refs/tags/cowork-v')
        id: changelog
        shell: bash
        run: |
          PREV_TAG=$(git describe --tags --match='cowork-v*' --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG="Initial Cowork release."
          else
            CHANGELOG=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s (%h)" --no-merges -- cowork/ src/server/ src/providers/_shared/)
          fi
          {
            echo "CHANGELOG<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/cowork-v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: "Cowork ${{ steps.version.outputs.VERSION }}"
          body: |
            ## Cowork ${{ steps.version.outputs.VERSION }}

            ## Changes

            ${{ steps.changelog.outputs.CHANGELOG }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'rc') || contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'alpha') }}
