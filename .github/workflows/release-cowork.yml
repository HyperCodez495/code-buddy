name: Release Cowork

on:
  workflow_dispatch:
  push:
    tags:
      - 'cowork-v*'

permissions:
  contents: write
  packages: write

jobs:
  release-cowork:
    name: Build Cowork
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install Cowork dependencies
        working-directory: cowork
        run: npm ci

      - name: Compile core
        run: npx tsc -p .

      - name: Build Cowork App
        working-directory: cowork
        run: npm run build

      # Tests intentionally removed

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Cowork-Build
          path: |
            cowork/release/**
            cowork/dist-electron/**
            cowork/dist/**
          if-no-files-found: warn

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/cowork-v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/cowork-v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(node -p "require('./cowork/package.json').version")" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/cowork-v')
        working-directory: cowork
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/cowork-v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: Cowork ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'rc') || contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'alpha') }}
