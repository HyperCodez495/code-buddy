name: Build Cowork (Windows)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Root
        run: npm ci

      - name: Install Cowork
        working-directory: cowork
        run: npm ci

      - name: Compile Core
        run: npx tsc -p .

      - name: Build App
        working-directory: cowork
        run: npm run build

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: Cowork-Windows
          path: |
            cowork/release/**
            cowork/dist-electron/**
