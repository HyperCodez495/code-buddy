name: Build Cowork (Windows)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install Cowork dependencies
        working-directory: cowork
        run: npm ci

      - name: Build Core
        run: npx tsc -p .

      - name: Build Cowork
        working-directory: cowork
        run: npm run build:win

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Cowork-Windows
          path: |
            cowork/release/**
            cowork/dist/**
            cowork/dist-electron/**
          if-no-files-found: warn
