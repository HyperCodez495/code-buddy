name: Build Windows Exe

on:
  workflow_dispatch:      # lets you trigger it manually from the Actions tab
  push:
    branches: [ main ]
    paths:
      - 'cowork/**'
      - '.github/workflows/build-windows.yml'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root project dependencies
        run: npm ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build root project (produces dist/)
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cowork dependencies
        working-directory: cowork
        run: npm ci
        env:
          # avoid GitHub API rate limiting / publish-token errors during install
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows installer
        working-directory: cowork
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # electron-builder tries to publish/check GitHub releases unless told not to
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: code-buddy-cowork-windows
          path: |
            cowork/release/*.exe
            cowork/release/*.msi
          if-no-files-found: warn
