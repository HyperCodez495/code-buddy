# Install as ~/.config/pipewire/pipewire.conf.d/90-codebuddy-echo-cancel.conf
context.modules = [
  { name = libpipewire-module-echo-cancel
    flags = [ ifexists nofail ]
    args = {
      library.name = aec/libspa-aec-webrtc
      node.latency = 512/48000
      capture.props = {
        node.name = "echo-cancel-capture"
        node.description = "Code Buddy AEC microphone capture"
      }
      source.props = {
        node.name = "echo-cancel-source"
        node.description = "Code Buddy echo-cancelled microphone"
      }
      sink.props = {
        node.name = "echo-cancel-sink"
        node.description = "Code Buddy AEC playback"
      }
      playback.props = {
        node.name = "echo-cancel-playback"
        node.description = "Code Buddy AEC speaker playback"
      }
    }
  }
]
